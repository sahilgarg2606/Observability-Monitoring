groups:
# ==========================================
# INFRASTRUCTURE ALERTS
# ==========================================
- name: Infrastructure Alerts - Tier 1
  rules:
  - alert: NodeDown
    expr: up{job="node-exporter"} == 0
    for: 15s
    labels:
      severity: critical
      team: infra
      escalation_tier: l1_developer
    annotations:
      summary: "Node Exporter Down"
      description: "Host monitoring has stopped. Infra team notified."
  - alert: BlackboxExporterDown
    expr: up{job="blackbox-exporter"} == 0
    for: 30s
    labels:
      severity: critical
      team: backend
      escalation_tier: l1_developer
    annotations:
      summary: "Blackbox Exporter Down"
      description: "Application monitoring exporter is unavailable." 
  - alert: PrometheusDown
    expr: up{job="prometheus"} == 0
    for: 15s
    labels:
      severity: critical
      team: infra
      escalation_tier: l1_developer
    annotations:
      summary: "Prometheus Down"
      description: "Prometheus server is unreachable."

  - alert: PostgreSQLExporterDown
    expr: up{job="postgres-exporter"} == 0
    for: 15s
    labels:
      severity: critical
      team: dba
      escalation_tier: l1_developer
    annotations:
      summary: "Postgres Exporter Down"
      description: "Database metrics are unavailable."
      
  - alert: CAdvisorDown
    expr: up{job="cadvisor"} == 0
    for: 15s
    labels:
      severity: warning
      team: infra
      escalation_tier: l1_developer
    annotations:
      summary: "cAdvisor Down"
      description: "Container monitoring stopped."
  - alert: HighCPUUsage
    expr: (100 - (avg by(instance) (irate(node_cpu_seconds_total{mode="idle"}[5m])) * 100)) > 80
    for: 2m
    labels:
      severity: warning
      team: infra
      escalation_tier: l1_developer
    annotations:
      summary: "High CPU Usage"
      description: "CPU usage is above 80% for more than 2 minutes."
  
  - alert: HighMemoryUsage
    expr: ((1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100) > 80
    for: 2m
    labels:
      severity: warning
      team: infra
      escalation_tier: l1_developer
    annotations:
      summary: "High Memory Usage"
      description: "Memory utilization exceeded 80%."

  - alert: HighDiskUsage
    expr: (100 - ((node_filesystem_avail_bytes{fstype!~"tmpfs|overlay"} * 100) / node_filesystem_size_bytes{fstype!~"tmpfs|overlay"})) > 85
    for: 5m
    labels:
      severity: warning
      team: infra
      escalation_tier: l1_developer
    annotations:
      summary: "High Disk Usage"
      description: "Disk usage exceeded 85%."

  - alert: HighSystemLoad
    expr: node_load1 > 4
    for: 5m
    labels:
      severity: warning
      team: infra
      escalation_tier: l1_developer
    annotations:
      summary: "High System Load"
      description: "System load average is high."
 
  - alert: ContainerDown
    expr: absent(container_last_seen{name!=""})
    for: 30s
    labels:
      severity: critical
      team: infra
      escalation_tier: l1_developer
    annotations:
      summary: "Container Down"
      description: "One or more containers are not reporting metrics."
  - alert: HighContainerCPU
    expr: rate(container_cpu_usage_seconds_total{name!=""}[5m]) * 100 > 80
    for: 2m
    labels:
      severity: warning
      team: infra
      escalation_tier: l1_developer
    annotations:
      summary: "High Container CPU Usage"
      description: "Container CPU usage is above 80%."
  - alert: HighContainerMemory
    expr: (container_memory_usage_bytes{name!=""} / container_spec_memory_limit_bytes{name!=""}) * 100 > 80
    for: 2m
    labels:
      severity: warning
      team: infra
      escalation_tier: l1_developer
    annotations:
      summary: "High Container Memory Usage"
      description: "Container memory usage exceeded 80%."
 
- name: Infrastructure Alerts - Tier 2
  rules:
  - alert: NodeDown_Escalated
    expr: up{job="node-exporter"} == 0
    for: 1m
    labels:
      severity: critical
      team: infra
      escalation_tier: l2_team_lead
    annotations:
      summary: "ESCALATION: Node Down for 3+ Hours"
      description: "Host monitoring down for >3 hours. Escalating to Infra Lead."
  - alert: BlackboxExporterDown_Escalated
    expr: up{job="blackbox-exporter"} == 0
    for: 1m
    labels:
      severity: critical
      team: backend
      escalation_tier: l2_team_lead
    annotations:
      summary: "ESCALATION: Blackbox Exporter Down for 3+ Hours"
      description: "Application monitoring exporter unavailable for >3 hours. Escalating to Backend Lead."

  - alert: PrometheusDown_Escalated
    expr: up{job="prometheus"} == 0
    for: 1m
    labels:
      severity: critical
      team: infra
      escalation_tier: l2_team_lead
    annotations:
      summary: "ESCALATION: Prometheus Down for 3+ Hours"
      description: "Prometheus unreachable for >3 hours. Escalating to Infra Lead."
      
  - alert: PostgreSQLExporterDown_Escalated
    expr: up{job="postgres-exporter"} == 0
    for: 1m
    labels:
      severity: critical
      team: dba
      escalation_tier: l2_team_lead
    annotations:
      summary: "ESCALATION: Postgres Exporter Down for 3+ Hours"
      description: "Database metrics unavailable for >3 hours. Escalating to DBA Lead."
      
  - alert: CAdvisorDown_Escalated
    expr: up{job="cadvisor"} == 0
    for: 1m
    labels:
      severity: warning
      team: infra
      escalation_tier: l2_team_lead
    annotations:
      summary: "ESCALATION: cAdvisor Down for 3+ Hours"
      description: "Container monitoring down for >3 hours. Escalating to Infra Lead."
  - alert: HighCPUUsage_Escalated
    expr: (100 - (avg by(instance) (irate(node_cpu_seconds_total{mode="idle"}[5m])) * 100)) > 80
    for: 15m
    labels:
      severity: critical
      team: infra
      escalation_tier: l2_team_lead
    annotations:
      summary: "ESCALATION: High CPU Usage"
      description: "CPU usage above 80% for 15 minutes."

  - alert: HighMemoryUsage_Escalated
    expr: ((1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100) > 80
    for: 15m
    labels:
      severity: critical
      team: infra
      escalation_tier: l2_team_lead
    annotations:
      summary: "ESCALATION: High Memory Usage"
      description: "Memory utilization above 80% for 15 minutes."

  - alert: HighDiskUsage_Escalated
    expr: (100 - ((node_filesystem_avail_bytes{fstype!~"tmpfs|overlay"} * 100) / node_filesystem_size_bytes{fstype!~"tmpfs|overlay"})) > 85
    for: 20m
    labels:
      severity: critical
      team: infra
      escalation_tier: l2_team_lead
    annotations:
      summary: "ESCALATION: High Disk Usage"
      description: "Disk usage exceeded 85% for 20 minutes."
  
