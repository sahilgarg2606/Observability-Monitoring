# ==========================================
# APPLICATION ALERTS
# ==========================================
- name: Application Alerts - Tier 1
  rules:
  - alert: BackendAPIDown
    expr: probe_success{job="backend-api"} == 0 or absent(probe_success{job="backend-api"})
    for: 15s
    labels:
      severity: critical
      team: backend
      escalation_tier: l1_developer
    annotations:
      summary: "Backend API Down"
      description: "Backend API health check failed. Backend dev notified."

  - alert: InvoiceAPIDown
    expr: probe_success{job="invoice-api"} == 0 or absent(probe_success{job="invoice-api"})
    for: 15s
    labels:
      severity: critical
      team: backend
      escalation_tier: l1_developer
    annotations:
      summary: "Invoice API Down"
      description: "Invoice API health check failed."
  - alert: HighInvoiceAPIResponseTime
    expr: probe_duration_seconds{job="invoice-api"} > 2
    for: 2m
    labels:
      severity: warning
      team: backend
      escalation_tier: l1_developer
    annotations:
      summary: "High Invoice API Response Time"
      description: "Invoice API response time is above 2 seconds."
  - alert: HighAPIResponseTime
    expr: probe_duration_seconds{job="backend-api"} > 2
    for: 2m
    labels:
      severity: warning
      team: backend
      escalation_tier: l1_developer
    annotations:
      summary: "High Backend API Response Time"
      description: "Backend API response time is above 2 seconds."
  - alert: SSLCertificateExpiringSoon
    expr: (probe_ssl_earliest_cert_expiry - time()) < 86400 * 15
    for: 10m
    labels:
      severity: warning
      team: backend
      escalation_tier: l1_developer
    annotations:
      summary: "SSL Certificate Expiring Soon"
      description: "SSL certificate will expire within 15 days."
  - alert: HTTPStatusNot200
    expr: probe_http_status_code != 200
    for: 30s
    labels:
      severity: critical
      team: backend
      escalation_tier: l1_developer
    annotations:
      summary: "Unexpected HTTP Status"
      description: "API returned a non-200 HTTP status."
- name: Application Alerts - Tier 2
  rules:
  - alert: BackendAPIDown_Escalated
    expr: probe_success{job="backend-api"} == 0 or absent(probe_success{job="backend-api"})
    for: 1m
    labels:
      severity: critical
      team: backend
      escalation_tier: l2_team_lead
    annotations:
      summary: "ESCALATION: Backend API Down for 3+ Hours"
      description: "Backend API unreachable for >3 hours. Escalating to Backend Lead."
      
  - alert: InvoiceAPIDown_Escalated
    expr:   probe_success{job="invoice-api"} == 0
      or absent(probe_success{job="invoice-api"})
    for: 1m
    labels:
      severity: critical
      team: backend
      escalation_tier: l2_team_lead
    annotations:
      summary: "ESCALATION: Invoice API Down for 3+ Hours"
      description: "Invoice API unreachable for >3 hours. Escalating to Backend Lead."

- name: Application Alerts - Tier 3
  rules:
  - alert: BackendAPIDown_Manager
    expr: probe_success{job="backend-api"} == 0 or absent(probe_success{job="backend-api"})
    for: 2m
    labels:
      severity: critical
      team: backend
      escalation_tier: l3_manager
    annotations:
      summary: "L3 ESCALATION: Backend API Down for 6+ Hours"
      description: "Backend API unreachable for >6 hours. Escalating to Manager."
  - alert: InvoiceAPIDown_Manager
    expr: probe_success{job="invoice-api"} == 0 or absent(probe_success{job="invoice-api"})
    for: 2m
    labels:
      severity: critical
      team: backend
      escalation_tier: l3_manager
    annotations:
      summary: "L3 ESCALATION: Invoice API Down for 6+ Hours"
      description: "Invoice API unreachable for >6 hours. Escalating to Manager."

- name: Application Alerts - Tier 4
  rules:
  - alert: BackendAPIDown_CTO
    expr: probe_success{job="backend-api"} == 0 or absent(probe_success{job="backend-api"})
    for: 3m
    labels:
      severity: critical
      team: backend
      escalation_tier: l4_cto
    annotations:
