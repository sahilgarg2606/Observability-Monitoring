      description: "Invoice API unreachable for >12 hours. Escalating to CTO."

# ==========================================
# DATABASE ALERTS
# ==========================================
- name: Database Alerts - Tier 1
  rules:
  - alert: HighDatabaseConnections
    expr: sum(pg_stat_database_numbackends) > 20
    for: 15s
    labels:
      severity: warning
      team: dba
      escalation_tier: l1_developer
    annotations:
      summary: "High Database Connections"
      description: "Too many active PostgreSQL connections. DBA notified."
    
  - alert: DatabaseDeadlocks
    expr: rate(pg_stat_database_deadlocks[5m]) > 0
    for: 15s
    labels:
      severity: warning
      team: dba
      escalation_tier: l1_developer
    annotations:
      summary: "Database Deadlocks"
      description: "Deadlocks detected."
  - alert: PostgreSQLDown
    expr: pg_up == 0
    for: 30s
    labels:
      severity: critical
      team: dba
      escalation_tier: l1_developer
    annotations:
      summary: "PostgreSQL Down"
      description: "PostgreSQL server is unreachable."
  - alert: LongRunningTransactions
    expr: pg_stat_activity_max_tx_duration > 300
    for: 2m
    labels:
      severity: warning
      team: dba
      escalation_tier: l1_developer
    annotations:
      summary: "Long Running Transactions"
      description: "Transaction running for more than 5 minutes."
  - alert: DatabaseSizeHigh
    expr: pg_database_size_bytes > 10737418240
    for: 5m
    labels:
      severity: warning
      team: dba
      escalation_tier: l1_developer
    annotations:
      summary: "Database Size High"
      description: "Database size exceeded 10 GB."
- name: Database Alerts - Tier 2
  rules:
  - alert: HighDatabaseConnections_Escalated
    expr: sum(pg_stat_database_numbackends) > 20
    for: 1m
    labels:
      severity: critical
      team: dba
      escalation_tier: l2_team_lead
    annotations:
      summary: "ESCALATION: Sustained High DB Connections"
      description: "Connections critically high for >3 hours. Escalating to DBA Lead."
      
  - alert: DatabaseDeadlocks_Escalated
    expr: rate(pg_stat_database_deadlocks[5m]) > 0  
    for: 1m
    labels:
      severity: critical
      team: dba
      escalation_tier: l2_team_lead
    annotations:
      summary: "ESCALATION: Sustained Database Deadlocks"
      description: "Deadlocks persisting for >3 hours. Escalating to DBA Lead."

- name: Database Alerts - Tier 3
  rules:
  - alert: HighDatabaseConnections_Manager
    expr: sum(pg_stat_database_numbackends) > 20
    for: 2m
    labels:
      severity: critical
      team: dba
      escalation_tier: l3_manager
    annotations:
      summary: "L3 ESCALATION: Sustained High DB Connections"
      description: "Connections critically high for >6 hours. Escalating to Manager."
  - alert: DatabaseDeadlocks_Manager
    expr: rate(pg_stat_database_deadlocks[5m]) > 0  
    for: 2m
    labels:
      severity: critical
      team: dba
      escalation_tier: l3_manager
    annotations:
      summary: "L3 ESCALATION: Sustained Database Deadlocks"
      description: "Deadlocks persisting for >6 hours. Escalating to Manager."

- name: Database Alerts - Tier 4
  rules:
  - alert: HighDatabaseConnections_CTO
    expr: sum(pg_stat_database_numbackends) > 20
    for: 3m
    labels:
      severity: critical
      team: dba
      escalation_tier: l4_cto
    annotations:
      summary: "L4 CRITICAL: Sustained High DB Connections"
      description: "Connections critically high for >12 hours. Escalating to CTO."
  - alert: DatabaseDeadlocks_CTO
    expr: rate(pg_stat_database_deadlocks[5m]) > 0  
    for: 3m
    labels:
      severity: critical
      team: dba
      escalation_tier: l4_cto
    annotations:
      summary: "L4 CRITICAL: Sustained Database Deadlocks"
      description: "Deadlocks persisting for >12 hours. Escalating to CTO."