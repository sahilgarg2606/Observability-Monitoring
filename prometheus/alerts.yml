groups:

- name: Infrastructure Alerts

  rules:

  - alert: NodeDown
    expr: up{job="node-exporter"} == 0
    for: 30s
    labels:
      severity: critical
    annotations:
      summary: "Node Exporter Down"
      description: "Host monitoring has stopped."

  - alert: PrometheusDown
    expr: up{job="prometheus"} == 0
    for: 30s
    labels:
      severity: critical
    annotations:
      summary: "Prometheus Down"
      description: "Prometheus server is unreachable."

  - alert: PostgreSQLExporterDown
    expr: up{job="postgres-exporter"} == 0
    for: 30s
    labels:
      severity: critical
    annotations:
      summary: "Postgres Exporter Down"
      description: "Database metrics are unavailable."

  - alert: CAdvisorDown
    expr: up{job="cadvisor"} == 0
    for: 30s
    labels:
      severity: warning
    annotations:
      summary: "cAdvisor Down"
      description: "Container monitoring stopped."
- name: Application Alerts

  rules:

  - alert: BackendAPIDown
    expr: probe_success{job="backend-api"} == 0
    for: 30s
    labels:
      severity: critical
    annotations:
      summary: "Backend API Down"
      description: "Backend API health check failed."

  - alert: InvoiceAPIDown
    expr: probe_success{job="invoice-api"} == 0
    for: 30s
    labels:
      severity: critical
    annotations:
      summary: "Invoice API Down"
      description: "Invoice API health check failed."
- name: Database Alerts

  rules:

  - alert: HighDatabaseConnections
    expr: sum(pg_stat_database_numbackends) > 20
    for: 1m
    labels:
      severity: warning
    annotations:
      summary: "High Database Connections"
      description: "Too many active PostgreSQL connections."

  - alert: DatabaseDeadlocks
    expr: rate(pg_stat_database_deadlocks[5m]) > 0
    for: 1m
    labels:
      severity: warning
    annotations:
      summary: "Database Deadlocks"
      description: "Deadlocks detected."