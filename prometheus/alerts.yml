groups:
  - name: infrastructure-alerts
    rules:
      - alert: HostCpuHigh
        expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage on {{ $labels.instance }}"
          description: "CPU usage has been above 85% for more than 5 minutes. Current value: {{ $value | printf \"%.2f\" }}%"

      - alert: HostMemoryLow
        expr: (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) * 100 < 15
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Low memory available on {{ $labels.instance }}"
          description: "Available memory is below 15% for more than 5 minutes. Current value: {{ $value | printf \"%.2f\" }}%"

      - alert: HostDiskSpaceLow
        expr: (node_filesystem_free_bytes{mountpoint="/"}/node_filesystem_size_bytes{mountpoint="/"}) * 100 < 15
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "Disk space low on {{ $labels.instance }}"
          description: "Available disk space is below 15% on mountpoint / for more than 10 minutes."

  - name: service-alerts
    rules:
      - alert: ServiceDown
        expr: probe_success == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Service downtime detected: {{ $labels.instance }}"
          description: "Active HTTP check for {{ $labels.instance }} failed for more than 1 minute."

      - alert: ServiceLatencyHigh
        expr: probe_duration_seconds > 2.0
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "High response latency for {{ $labels.instance }}"
          description: "HTTP check latency is above 2.0 seconds for more than 3 minutes. Current value: {{ $value | printf \"%.2f\" }}s"

      - alert: ContainerRestartsSpiking
        expr: changes(container_start_time_seconds{container_label_com_docker_compose_service!=""}[5m]) > 1
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Container restart loop detected: {{ $labels.container_label_com_docker_compose_service }}"
          description: "Container has restarted multiple times in the last 5 minutes."
